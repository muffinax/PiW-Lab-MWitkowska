<!doctype html>
<html lang="pl">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To do list</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>

  <body>
    <header>
      <h1>TO DO LIST</h1>
    </header>

    <main>
      <section class="list-card">
        <form action="#" onsubmit="return false;">
          <input type="text" id="title" placeholder="Lista zadań" class="list-title" />
        </form>

        <button class="back-task-button" onclick="back()"> Przywróć usunięte zadanie </button>

        <section class="list-tasks">
          <form action="#" onsubmit="return false;"></form>
        </section>

        <input type="text" id="task" placeholder="Zadanie do zrobienia" class="task-title" />
        <button class="new-task-button" onclick="add_task()"> Dodaj zadanie</button>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
