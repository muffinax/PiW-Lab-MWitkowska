<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHIŃCZYK</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>

  <body>
    <header>
      <div class="header-up">
        <h1><a href="index.html" style="text-decoration: none; color: inherit;">CHIŃCZYK</a></h1>
        <div class="header-buttons">
          <button class="header-button">Wyloguj</button>
          <button class="header-button">Powrót do sklepu</button>
        </div>
      </div>
    </header>

    <main>
      <h2>Dodaj nową planszówkę</h2>
        <div class="header-search">
          <label for="new-title">Nazwa gry:</label>
          <input type="text" id="new-title" placeholder="Podaj nazwę gry" required>
        </div>
        <div class="header-search">
          <label for="new-category">Kategoria:</label>
          <input type="text" id="new-category" placeholder="Podaj kategorię" required>
        </div>
        <div class="header-search">
          <label for="new-players">Ilość graczy:</label>
          <input type="text" id="new-players" placeholder="Podaj ilość graczy" required>
        </div>
        <div class="header-search">
          <label for="new-time">Czas:</label>
          <input type="text" id="new-time" placeholder="Podaj czas" required>
        </div>
        <div class="header-price">
          <label for="new-price">Cena (zł):</label>
          <input type="text" id="new-price" placeholder="Podaj cenę" required>
        </div>
        <div class="header-buttons">
          <button class="header-button">Dodaj</button>
          <button class="header-button">Anuluj</button>
        </div>
    </main>
  </body>
</html>
